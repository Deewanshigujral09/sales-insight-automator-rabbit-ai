name: CI — Build, Lint & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend: Lint & Test ─────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Verify server starts
        run: |
          # Start the server with dummy env vars and check it boots
          OPENAI_API_KEY=dummy \
          SMTP_USER=test@test.com \
          SMTP_PASS=dummy \
          NODE_ENV=test \
          timeout 10s node src/server.js &
          sleep 4
          curl --fail http://localhost:5000/api/health || (echo "Health check failed!" && exit 1)
          echo "✅ Server health check passed"

  # ─── Frontend: Build & Lint ───────────────────────────────────────
  frontend-ci:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:5000
          CI: false  # Treat warnings as non-fatal

      - name: Check build output exists
        run: |
          test -f build/index.html && echo "✅ Build output verified" || (echo "❌ Build failed" && exit 1)

  # ─── Docker: Build Validation ────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sia-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sia-frontend:ci
          build-args: |
            REACT_APP_API_URL=http://localhost:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose config
        run: docker compose config --quiet && echo "✅ docker-compose.yml is valid"

  # ─── Security: Dependency Audit ───────────────────────────────────
  security-audit:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high --production || echo "⚠️ Audit warnings found — review before merging"

      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high --production || echo "⚠️ Audit warnings found — review before merging"
